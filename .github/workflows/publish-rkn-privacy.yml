name: Publish RKN privacy policy
on:
  pull_request_target:
    types: [opened]
permissions:
  contents: write
  pull-requests: write
jobs:
  publish:
    if: github.event.pull_request.title == 'Publish RKN privacy policy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Publish canonical privacy route
        run: |
          python3 - <<'PY'
          from pathlib import Path
          for page in Path('web').rglob('*.html'):
            text=page.read_text().replace('/legal/privacy.html','/page/privacy')
            if page.name=='index.html':
              text=text.replace('src="https://yandex.ru/sprav/widget/rating-badge/79890320490?type=rating"','data-consent-src="https://yandex.ru/sprav/widget/rating-badge/79890320490?type=rating"')
              text=text.replace('Мы используем cookie и Яндекс Метрику. Подробнее —','Необходимые cookie обеспечивают работу сайта. Метрика и внешний рейтинг включаются только после согласия. Подробнее —')
            page.write_text(text)
          sitemap=Path('web/sitemap.xml')
          sitemap.write_text(sitemap.read_text().replace('/legal/privacy.html','/page/privacy'))
          server=Path('src/app.js')
          text=server.read_text()
          marker="if(pathname==='/')pathname='/index.html';"
          addition=marker+"if(pathname==='/page/privacy'||pathname==='/page/privacy/')pathname='/legal/privacy.html';"
          if "pathname==='/page/privacy'" not in text:
            if marker not in text: raise SystemExit('route marker not found')
            text=text.replace(marker,addition)
          server.write_text(text)
          Path('test/rkn-privacy.test.js').write_text('''import test from "node:test";\nimport assert from "node:assert/strict";\nimport {readFile} from "node:fs/promises";\n\ntest("publishes canonical privacy policy and consent-gates Yandex",async()=>{\n const html=await readFile(new URL("../web/index.html",import.meta.url),"utf8");\n const policy=await readFile(new URL("../web/legal/privacy.html",import.meta.url),"utf8");\n const server=await readFile(new URL("../src/app.js",import.meta.url),"utf8");\n assert.match(html,/href="\\/page\\/privacy"/);\n assert.match(html,/data-consent-src="https:\\/\\/yandex\\.ru\\/sprav\\/widget/);\n assert.doesNotMatch(html,/href="\\/legal\\/privacy\\.html"/);\n assert.match(policy,/ИП Горева Любовь Григорьевна/);\n assert.match(policy,/U-ON Travel/);\n assert.match(policy,/счётчик № 110979041/);\n assert.match(server,/pathname==='\\/page\\/privacy'/);\n});\n''')
          PY
          npm test
          rm -f .github/workflows/publish-rkn-privacy.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(legal): опубликовать политику ПД по основному адресу'
          git push origin main
