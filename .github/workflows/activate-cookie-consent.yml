name: Activate cookie consent
on:
  pull_request_target:
    types: [opened]
permissions:
  contents: write
  pull-requests: write
jobs:
  activate:
    if: github.event.pull_request.title == 'Activate cookie consent'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('web/index.html'); s=p.read_text()
          old='<script src="/assets/app.js" defer></script>'
          new=old+'<script src="/assets/cookie-consent.js" defer></script>'
          if 'cookie-consent.js' not in s: s=s.replace(old,new)
          p.write_text(s)
          p=Path('web/legal/privacy.html'); s=p.read_text()
          old='Имя, телефон, email, параметры путешествия, технические cookie и сведения о взаимодействии с сайтом.'
          new='Имя, телефон, email, параметры путешествия и необходимые технические cookie. Яндекс Метрика включается только после согласия. Пользователь может отклонить аналитику или изменить выбор через кнопку «Настройки cookie».'
          p.write_text(s.replace(old,new))
          Path('test/cookie-consent.test.js').write_text('''import test from "node:test";\nimport assert from "node:assert/strict";\nimport {readFile} from "node:fs/promises";\ntest("cookie choice can be accepted rejected and changed",async()=>{const h=await readFile(new URL("../web/index.html",import.meta.url),"utf8");const j=await readFile(new URL("../web/assets/cookie-consent.js",import.meta.url),"utf8");assert.match(h,/cookie-consent\\.js/);assert.match(j,/reject-cookies/);assert.match(j,/seaEscapeCookieRejected/);assert.match(j,/cookie-settings/);assert.match(j,/METRIKA_ID,'destruct'/)});\n''')
          PY
          npm test
          rm -f .github/workflows/activate-cookie-consent.yml .github/workflows/complete-cookie-consent.yml .github/workflows/complete-cookie-consent-v2.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(site): завершить управление cookie consent'
          git push origin main
