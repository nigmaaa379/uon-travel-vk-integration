name: Add Yandex Business widget
on:
  push:
    paths:
      - '.github/workflows/add-yandex-business-widget.yml'
permissions:
  contents: write
jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Add official rating badge
        run: |
          python3 - <<'PY'
          from pathlib import Path
          page=Path('web/index.html')
          text=page.read_text()
          old='<p>Средняя оценка клиентов. Здесь подключается официальный виджет Яндекс Бизнеса.</p><a href="https://yandex.ru/maps/" rel="noopener">Открыть отзывы на Яндекс Картах →</a>'
          new='<p>Актуальный рейтинг турагентства на Яндекс Картах.</p><iframe src="https://yandex.ru/sprav/widget/rating-badge/79890320490?type=rating" width="150" height="50" frameborder="0" title="Рейтинг Сбежим на море в Яндекс Бизнесе" loading="lazy"></iframe>'
          if old not in text:
              raise SystemExit('Review placeholder not found')
          text=text.replace(old,new)
          text=text.replace('<small>Контейнер для iframe Яндекс Бизнеса</small>','<small>Отзывы опубликованы на Яндекс Картах</small>')
          page.write_text(text)
          Path('test/yandex-business-widget.test.js').write_text('''import test from "node:test";\nimport assert from "node:assert/strict";\nimport { readFile } from "node:fs/promises";\n\ntest("shows the official Yandex Business rating badge", async () => {\n  const html = await readFile(new URL("../web/index.html", import.meta.url), "utf8");\n  assert.match(html, /yandex\\.ru\\/sprav\\/widget\\/rating-badge\\/79890320490\\?type=rating/);\n  assert.match(html, /title="Рейтинг Сбежим на море в Яндекс Бизнесе"/);\n  assert.doesNotMatch(html, /Контейнер для iframe Яндекс Бизнеса/);\n});\n''')
          PY
      - name: Test
        run: npm test
      - name: Commit
        run: |
          rm -f .github/workflows/add-yandex-business-widget.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(site): добавить рейтинг Яндекс Бизнеса'
          git push
