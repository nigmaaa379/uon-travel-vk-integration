name: Fill company details
on:
  push:
    paths:
      - '.github/workflows/fill-company-details.yml'
permissions:
  contents: write
jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fill verified company details
        run: |
          python3 - <<'PY'
          from pathlib import Path
          company='ИП Горева Любовь Григорьевна'
          inn='761700450685'
          ogrnip='325762700017919'
          registry='РТА 0049975'
          address='150067, Ярославская область, Ярославский р-н, пос. Красный бор, ул. Мирная, д. 14, кв. 61'
          phone='+7 (920) 124-20-33'
          email='l_g_goreva@mail.ru'
          common={
            'https://example.ru/':'https://tursbezhimnamore.ru/',
            '+7-000-000-00-00':'+7-920-124-20-33',
            '+70000000000':'+79201242033',
            '+7 (000) 000-00-00':phone,
            'hello@example.ru':email,
            '[ИП / ООО «Сбежим на море»]':company,
            'ИНН [номер] · ОГРН [номер]':f'ИНН {inn} · ОГРНИП {ogrnip}',
            'Реестр: [RTA 000000]':f'ЕФРТА: {registry}',
            '[Юридический и фактический адрес]':address,
            'Ежедневно, 09:00–21:00':'Пн–Сб, 10:00–19:00',
            '[Юридический адрес]':address,
            '© 2026 «Сбежим на море». [ИНН] · [ОГРН] · [RTA]':f'© 2026 «Сбежим на море». ИНН {inn} · ОГРНИП {ogrnip} · ЕФРТА {registry}',
            'Перед публикацией замените значения в квадратных скобках на подтверждённые данные.':'Сведения о турагенте и официальные контакты для связи.',
            'https://wa.me/70000000000':'https://wa.me/79201242033',
          }
          for page in Path('web').rglob('*.html'):
            text=page.read_text()
            for old,new in common.items(): text=text.replace(old,new)
            page.write_text(text)
          index=Path('web/index.html')
          text=index.read_text()
          text=text.replace('<a href="https://t.me/username" rel="noopener">Telegram</a>','')
          old='<script type="application/ld+json">{"@context":"https://schema.org","@type":"TravelAgency","name":"Сбежим на море","url":"https://tursbezhimnamore.ru/","telephone":"+7-920-124-20-33","email":"l_g_goreva@mail.ru","areaServed":"Worldwide","priceRange":"₽₽₽"}</script>'
          new='<script type="application/ld+json">{"@context":"https://schema.org","@type":"TravelAgency","name":"Сбежим на море","legalName":"ИП Горева Любовь Григорьевна","url":"https://tursbezhimnamore.ru/","telephone":"+7-920-124-20-33","email":"l_g_goreva@mail.ru","taxID":"761700450685","identifier":["ОГРНИП 325762700017919","ЕФРТА РТА 0049975"],"address":{"@type":"PostalAddress","streetAddress":"ул. Мирная, д. 14, кв. 61","addressLocality":"пос. Красный бор, Ярославский р-н","addressRegion":"Ярославская область","postalCode":"150067","addressCountry":"RU"},"openingHours":"Mo-Sa 10:00-19:00","areaServed":"Worldwide","priceRange":"₽₽₽"}</script>'
          if old not in text: raise SystemExit('Structured data pattern not found')
          index.write_text(text.replace(old,new))
          legal_replacements={
            'web/legal/privacy.html':('[Наименование], ИНН [номер], ОГРН [номер], адрес [адрес], email l_g_goreva@mail.ru. Согласие можно отозвать письмом оператору.',f'{company}, ИНН {inn}, ОГРНИП {ogrnip}, ЕФРТА {registry}, адрес: {address}, email {email}. Согласие можно отозвать письмом оператору.'),
            'web/legal/consent.html':('[наименование и реквизиты]. Согласие действует до отзыва, направленного на l_g_goreva@mail.ru.',f'{company}, ИНН {inn}, ОГРНИП {ogrnip}, адрес: {address}. Согласие действует до отзыва, направленного на {email}.'),
            'web/legal/offer.html':('[Полное наименование], ИНН [номер], ОГРН [номер], RTA [номер], адрес [адрес].',f'{company}, ИНН {inn}, ОГРНИП {ogrnip}, ЕФРТА {registry}, адрес: {address}, телефон {phone}, email {email}.'),
          }
          warnings={
            'Шаблон необходимо заполнить фактическими реквизитами и проверить у юриста до публикации.':'Редакция от 24 июля 2026 года. Перед публикацией рекомендуется юридическая проверка.',
            'Заполните реквизиты оператора и проверьте текст у юриста.':'Редакция от 24 июля 2026 года. Перед публикацией рекомендуется юридическая проверка.',
            'Юридический шаблон: заполните реквизиты и согласуйте с профильным юристом.':'Редакция от 24 июля 2026 года. Перед публикацией рекомендуется юридическая проверка.',
          }
          details=f'<section class="operator-details"><h2>Реквизиты исполнителя</h2><p>{company}<br>ИНН {inn} · ОГРНИП {ogrnip} · ЕФРТА {registry}<br>{address}<br>Телефон: <a href="tel:+79201242033">{phone}</a><br>Email: <a href="mailto:{email}">{email}</a><br>Режим работы: Пн–Сб 10:00–19:00</p></section>'
          for path,(old,new) in legal_replacements.items():
            p=Path(path); text=p.read_text()
            if old not in text: raise SystemExit(f'Placeholder not found: {path}')
            p.write_text(text.replace(old,new))
          for p in Path('web/legal').glob('*.html'):
            text=p.read_text()
            for old,new in warnings.items(): text=text.replace(old,new)
            if 'operator-details' not in text: text=text.replace('</article>',details+'</article>')
            p.write_text(text)
          test=Path('test/company-details.test.js')
          test.write_text('''import test from "node:test";\nimport assert from "node:assert/strict";\nimport { readFile, readdir } from "node:fs/promises";\n\ntest("publishes verified company details without placeholders", async () => {\n  const index = await readFile(new URL("../web/index.html", import.meta.url), "utf8");\n  for (const value of ["ИП Горева Любовь Григорьевна", "761700450685", "325762700017919", "РТА 0049975", "+7 (920) 124-20-33", "l_g_goreva@mail.ru"]) assert.match(index, new RegExp(value.replace(/[()+]/g, "\\\\$&")));\n  for (const placeholder of ["example.ru", "+7 (000) 000-00-00", "hello@example.ru", "[ИНН]", "[ОГРН]", "[RTA]", "t.me/username"]) assert.equal(index.includes(placeholder), false);\n  const dir = new URL("../web/legal/", import.meta.url);\n  for (const file of await readdir(dir)) {\n    if (!file.endsWith(".html")) continue;\n    const html = await readFile(new URL(file, dir), "utf8");\n    assert.match(html, /ИП Горева Любовь Григорьевна/);\n    assert.match(html, /761700450685/);\n    assert.match(html, /l_g_goreva@mail.ru/);\n  }\n});\n''')
          PY
      - name: Test
        run: npm test
      - name: Commit
        run: |
          rm -f .github/workflows/fill-company-details.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(site): заполнить реквизиты турагентства'
          git push
